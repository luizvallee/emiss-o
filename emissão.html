<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Ticket</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Conecta um arquivo CSS externo-->
</head>

<style>
    /* ===== ESTILIZAÇÃO DA PÁGINA ===== */

    body {
    font-family: Arial, sans-serif; 
    background: linear-gradient(135deg, #1e3c72, #2a5298); 
    display: flex; 
    justify-content: center; 
    padding-top: 50px;
}

main {
    background: white;
    padding: 25px; 
    border-radius: 12px; 
    width: 350px; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
}

label {
    font-weight: bold; 
    font-size: 14px;
}

input, select {
    width: 100%; 
    padding: 8px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc; 
}

/* ===== ESTILIZAÇÃO DO BOTÃO ===== */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none; 
    border-radius: 8px;
    background-color: #2a5298; 
    color: white; 
    font-size: 15px;
    font-weight: bold;
    cursor: pointer; 
    transition: 0.3s; 
}

/* ===== ESTILIZAÇÃO DA ÁREA DE RESULTADO ===== */
#ticket-resultado {
    background: #f4f7ff; 
    padding: 15px;
    border-radius: 10px;
    border-left: 5px solid #2a5298;
}

#ticket-resultado h3 {
    margin-bottom: 10px;
    color: #2a5298;
}

#ticket-resultado p {
    margin-bottom: 6px;
    font-size: 14px;
}
</style>

<body>

    <main>
        <!-- Área principal do sistema -->

        <section>
            <!-- Parte do formulário -->

            <label for="input-nome">Nome completo:</label>
            

            <input type="text" id="input-nome" placeholder="Digite seu nome completo">
            <!-- Campo onde o usuário digita nome e sobrenome -->

            <br><br>

            <label for="select-urgencia">Nível de urgência:</label>
            

            <select id="select-urgencia">
                <!-- Lista de opções -->
                <option value="2">Alta (2 dias)</option>
                <option value="7" selected>Média (7 dias)</option>
                <option value="10">Baixa (10 dias)</option>
            </select>

            <br><br>

            <button id="btn-gerar">Gerar Ticket</button>
            <!-- Botão que dispara a geração do ticket -->
        </section>

        <section id="ticket-resultado" style="display: none; margin-top: 20px;">
    

            <h3>Ticket Gerado</h3>

            <p>Cliente: <strong id="out-nome"></strong></p>
        

            <p>Data de Abertura: <time id="out-data"></time></p>
            <!-- Exibe a data atual -->

            <p>Prazo de Resposta: <mark id="out-prazo"></mark></p>
            <!-- Exibida a data limite -->
        </section>
    </main>

    <script src="scripts.js"></script>
    <!--JS externo-->

    <script>
/* ===== SCRIPT RESPONSÁVEL PELA LÓGICA ===== */

// Adiciona um "ouvinte" ao botão.
// Quando clicar, chama a função gerarTicket
document.getElementById('btn-gerar').addEventListener('click', gerarTicket);

function gerarTicket() {

    // Pega o valor digitado e remove espaços extras
    const nomeRaw = document.getElementById('input-nome').value.trim();

    // Validação simples:
    // Precisa ter pelo menos 3 caracteres
    // E pelo menos 2 palavras (nome + sobrenome)
    if (nomeRaw.length < 3 || nomeRaw.split(' ').length < 2) {
        alert("Digite nome e sobrenome válidos!");
        return; // Interrompe a função
    }

    // Converte tudo para maiúsculo e separa por espaço
    const partesNome = nomeRaw.toUpperCase().split(' ');
    const primeiroNome = partesNome[0]; // Primeira palavra
    const ultimoNome = partesNome[partesNome.length - 1]; // Última palavra

    // Cria objeto com data atual
    const dataAtual = new Date();

    // Cria outra data que será modificada para o prazo
    const dataPrazo = new Date();

    // Pega a quantidade de dias da urgência escolhida
    const diasUrgencia = parseInt(
        document.getElementById('select-urgencia').value
    );

    // Soma os dias ao prazo
    dataPrazo.setDate(dataAtual.getDate() + diasUrgencia);

    // Mostra o nome formatado na tela
    document.getElementById('out-nome').textContent =
        primeiroNome + " " + ultimoNome;

    // Mostra a data atual no formato brasileiro
    document.getElementById('out-data').textContent =
        dataAtual.toLocaleDateString('pt-BR');

    // Mostra o prazo calculado
    document.getElementById('out-prazo').textContent =
        dataPrazo.toLocaleDateString('pt-BR');

    // Torna visível a área do ticket
    document.getElementById('ticket-resultado').style.display = 'block';
}
</script>
</body>
</html>
